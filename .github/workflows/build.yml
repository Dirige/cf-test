name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        working-directory: ./cfst-server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -o cfst-server-${{ matrix.suffix }}${EXT} .

      - name: Package Windows release
        if: matrix.goos == 'windows'
        run: |
          mkdir -p release/cfst-server-${{ matrix.suffix }}
          cp cfst-server/cfst-server-${{ matrix.suffix }}.exe release/cfst-server-${{ matrix.suffix }}/
          cp cfst-server/config.yaml.example release/cfst-server-${{ matrix.suffix }}/
          cp cfst-server-win64/启动服务.bat release/cfst-server-${{ matrix.suffix }}/
          cp cfst-server-win64/使用说明.txt release/cfst-server-${{ matrix.suffix }}/
          cd release && zip -r cfst-server-${{ matrix.suffix }}.zip cfst-server-${{ matrix.suffix }}/

      - name: Package Linux release
        if: matrix.goos == 'linux'
        run: |
          mkdir -p release/cfst-server-${{ matrix.suffix }}
          cp cfst-server/cfst-server-${{ matrix.suffix }} release/cfst-server-${{ matrix.suffix }}/
          cp cfst-server/config.yaml.example release/cfst-server-${{ matrix.suffix }}/
          cd release && tar czf cfst-server-${{ matrix.suffix }}.tar.gz cfst-server-${{ matrix.suffix }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfst-server-${{ matrix.suffix }}
          path: |
            release/cfst-server-${{ matrix.suffix }}.zip
            release/cfst-server-${{ matrix.suffix }}.tar.gz
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
